name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format:check
      # The build runs without OPENROUTER_API_KEY on purpose: the key is read
      # inside the request handler, not at module load, so a missing key must never
      # be able to break a build. If this step starts needing a secret, something
      # has leaked into the wrong scope.
      - run: npm run build

      # Unit tests for the pure pipeline stages that never call a model — the
      # deterministic merge in particular, which is the synthesizer's fallback and the one
      # stage the replayed eval suite cannot reach (it only runs when a live synthesizer
      # returns unparseable JSON, which no fixture reproduces).
      - run: npm run test:unit

      # The eval suite, replayed from recorded fixtures: no network, no key, no spend,
      # and the same answer every time. This scores the PIPELINE — routing, the tripwire,
      # the merge, the line validation, the verdict, the totals — which is the part that
      # changes when somebody edits this repo.
      #
      # It deliberately does NOT ask whether the models still behave. That question needs
      # the real API, costs money, and has a different answer on different days; putting
      # it in front of a pull request would mean a build that goes red for reasons the
      # pull request did not cause, and a build like that is one people learn to ignore.
      # It runs nightly instead — see eval-nightly.yml.
      - run: npm run eval

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      # Playwright builds and starts the production server itself (see
      # playwright.config.ts), pointed at a local mock that answers with the recorded
      # eval fixtures — so this job needs no secret and spends nothing, same bargain
      # as the replayed evals above. The dummy key exists because the request handler
      # correctly refuses to run without one; nothing ever validates it.
      - run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
